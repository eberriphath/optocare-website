<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Optocare Partners</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.container {
    padding: 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.card h3 {
    margin-bottom: 10px;
}

.card p {
    margin: 5px 0;
}

.card a {
    display: inline-block;
    margin-top: 10px;
    color: #f97316;
    text-decoration: none;
    font-weight: bold;
}

.empty {
    text-align: center;
    color: #777;
    margin-top: 50px;
}
</style>
</head>

<body>

<nav class="navbar">
    <h2 class="logo">Optocare</h2>
</nav>

<div class="container">

    <h2>Our Optical Partners</h2>

    {% if partners|length == 0 %}
        <p class="empty">No partners available yet.</p>
    {% else %}

    <div class="grid">
        {% for partner in partners %}
        <div class="card">
            <h3>{{ partner.store_name }}</h3>
            <p><strong>Location:</strong> {{ partner.location }}</p>
            <p><strong>Services:</strong> {{ partner.services }}</p>

            <a href="{{ url_for('partner_profile', id=partner.id) }}">
                View Profile →
            </a>
        </div>
        {% endfor %}
    </div>

    {% endif %}

</div>

</body>
</html>
