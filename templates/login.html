<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Optocare</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .login-container {
            max-width: 400px;
            margin: 120px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .login-form button {
            width: 100%;
            background: #1e3a8a;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
        }

        .login-form button:hover {
            background: #172554;
        }

        .extra {
            text-align: center;
            margin-top: 15px;
        }

        .extra a {
            color: #f97316;
            text-decoration: none;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2 class="logo">Optocare</h2>
</nav>

<div class="login-container">
    <h2>Login</h2>

    <form class="login-form">
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="extra">
        <p>Don't have an account? <a href="{{ url_for('signup') }}">Apply here</a></p>
    </div>
</div>

</body>
</html>
